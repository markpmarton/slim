# Values for ingress-nginx Helm chart:
#   helm repo add ingress-nginx https://kubernetes.github.io/ingress-nginx
#   helm upgrade --install ingress-nginx ingress-nginx/ingress-nginx -n ingress-nginx -f ingress-values.yaml
#
# On KIND, Service type LoadBalancer is fulfilled if cloud-provider-kind is running
# (see task multi-cluster:lb:up in this folder).

controller:
  allowSnippetAnnotations: true

  # Required for nginx.ingress.kubernetes.io/ssl-passthrough on Ingresses (boolean flag).
  extraArgs:
    enable-ssl-passthrough: false

  config:
    annotations-risk-level: Critical

  service:
    type: LoadBalancer
